name: TourGuide CI

on:
  push:
    branches:
      - master
      - dev
  pull_request:
    branches:
      - master

jobs:
  build-test-package:
    runs-on: ubuntu-latest

    steps:

    # 1. Récupérer le code du repository
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Installer .NET
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '7.0.x'

    # 3. Restaurer les dépendances
    - name: Restore dependencies
      run: dotnet restore TourGuide.sln

    # 4. Compiler la solution
    - name: Build solution
      run: dotnet build TourGuide.sln --configuration Release --no-restore

    # 5. Lancer les tests AVEC COVERAGE
    - name: Run tests with coverage
      run: |
        dotnet test TourGuide.sln \
          --configuration Release \
          --no-build \
          --logger trx \
          --verbosity normal \
          /p:CollectCoverage=true \
          /p:CoverletOutputFormat=cobertura \
          /p:CoverletOutput=./TestResults/coverage.cobertura.xml

    # 6. Analyser et afficher le coverage
    - name: Code Coverage Summary
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: '**/TestResults/coverage.cobertura.xml'
        badge: true
        fail_below_min: false
        format: markdown
        hide_branch_rate: false
        hide_complexity: true
        indicators: true
        output: both
        thresholds: '75 85'

    # 7. Afficher le résumé dans GitHub Actions
    - name: Add Coverage PR Comment
      uses: marocchino/sticky-pull-request-comment@v2
      if: github.event_name == 'pull_request'
      with:
        recreate: true
        path: code-coverage-results.md

    # 8. Vérification custom avec warning
    - name: Check coverage threshold
      run: |
        sudo apt-get update && sudo apt-get install -y libxml2-utils bc
        
        COVERAGE=$(xmllint --xpath "string(//coverage/@line-rate)" **/TestResults/coverage.cobertura.xml 2>/dev/null || echo "0")
        COVERAGE_PERCENT=$(echo "$COVERAGE * 100" | bc -l | xargs printf "%.2f")
        
        echo "📊 Coverage actuel: $COVERAGE_PERCENT%"
        echo "coverage=$COVERAGE_PERCENT" >> $GITHUB_OUTPUT
        
        THRESHOLD=75
        
        if (( $(echo "$COVERAGE_PERCENT < $THRESHOLD" | bc -l) )); then
          echo "::warning title=Coverage faible::⚠️ Le coverage est de $COVERAGE_PERCENT% (recommandé: >$THRESHOLD%). Pensez à ajouter des tests !"
        else
          echo "::notice title=Coverage OK::✅ Excellent ! Coverage: $COVERAGE_PERCENT%"
        fi
      id: coverage
      continue-on-error: true

    # 9. Upload du rapport de coverage
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: |
          **/TestResults/coverage.cobertura.xml
          code-coverage-results.md
      if: always()

    # 10. Upload des résultats de tests
    - name: Upload test results
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: '**/*.trx'
      if: always()

    # 11. Publier les artéfacts
    - name: Publish application
      run: dotnet publish TourGuide.sln --configuration Release --output publish

    # 12. Upload des artéfacts
    - name: Zip artefact
      run: zip -r TourGuide.zip publish

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: TourGuide-zip
        path: TourGuide.zip
