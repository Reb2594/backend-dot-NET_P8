name: TourGuide CI

on:
  push:
    branches:
      - master
      - dev
  pull_request:
    branches:
      - master

jobs:
  build-test-package:
    runs-on: ubuntu-latest

    steps:

    # 1. Récupérer le code du repository
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Installer .NET
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '7.0.x'

    # 3. Restaurer les dépendances
    - name: Restore dependencies
      run: dotnet restore TourGuide.sln

    # 4. Compiler la solution
    - name: Build solution
      run: dotnet build TourGuide.sln --configuration Release --no-restore

    # 5. Lancer les tests avec coverage
    - name: Run tests with coverage
      run: |
        dotnet test TourGuideTest/TourGuideTest.csproj \
          --configuration Release \
          --no-build \
          --logger trx \
          --collect:"XPlat Code Coverage" \
          --results-directory ./coverage

    # 5b. Consolider le fichier de coverage
    - name: Prepare coverage report
      run: |
        COVERAGE_FILE=$(find coverage -name 'coverage.cobertura.xml' | head -1)
        
        if [ -z "$COVERAGE_FILE" ]; then
          echo "::error::Coverage file not found"
          exit 1
        fi
        
        echo "📊 Coverage file found: $COVERAGE_FILE"
        mkdir -p coverage-report
        cp "$COVERAGE_FILE" coverage-report/coverage.cobertura.xml

    # 6. Afficher le coverage dans GitHub
    - name: Code Coverage Report
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: coverage-report/coverage.cobertura.xml
        badge: true
        fail_below_min: false
        format: markdown
        hide_branch_rate: false
        hide_complexity: true
        indicators: true
        output: both
        thresholds: '60 80'

    # 7. Ajouter le résumé sur les PR
    - name: Add Coverage PR Comment
      uses: marocchino/sticky-pull-request-comment@v2
      if: github.event_name == 'pull_request'
      with:
        recreate: true
        path: code-coverage-results.md

    # 8. Upload des résultats de tests
    - name: Upload test results
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: '**/*.trx'
      if: always()

    # 9. Upload du rapport de coverage
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage-report/
      if: always()

    # 10. Publier les artéfacts
    - name: Publish application
      run: dotnet publish TourGuide.sln --configuration Release --output publish

    # 11. Upload des artéfacts
    - name: Zip artefact
      run: zip -r TourGuide.zip publish

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: TourGuide-zip
        path: TourGuide.zip
